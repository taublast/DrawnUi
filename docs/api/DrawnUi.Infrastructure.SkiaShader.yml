  assemblies:
  - DrawnUi.Maui
  namespace: DrawnUi.Infrastructure
  summary: >-
    Creates standard uniforms: iResolution, iImageResolution, iTime, iOffset, iMouse.

    Override to add custom uniforms for specialized shaders — the typical pattern is

    to call <code>base.CreateUniforms(...)</code> and then set extra keys on the returned

    instance.

    <p>

    IMPORTANT: the returned <xref href="SkiaSharp.SKRuntimeEffectUniforms" data-throw-if-not-resolved="false"></xref> is OWNED by this

    <xref href="DrawnUi.Infrastructure.SkiaShader" data-throw-if-not-resolved="false"></xref> and reused every frame. Do not dispose it and do not

    return a different instance from an override — mutate and return the same one.

    It is invalidated automatically when the compiled effect changes.

    </p>
  example: []
